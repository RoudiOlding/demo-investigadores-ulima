<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Investigadores - U Lima</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9; /* Mismo fondo de los gráficos */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #1a2530; /* Azul oscuro elegante */
            font-size: 26px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #666;
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background-color: #1E90FF; /* Azul Dodger */
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #104e8b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 144, 255, 0.3);
        }
        .btn-secondary {
            background-color: #FF8C00; /* Naranja de tu paleta */
        }
        .btn-secondary:hover {
            background-color: #cc7000;
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Categorización de Investigadores</h1>
        <p>Seleccione el nivel de profundidad visual que desea explorar para el análisis de las 5 comunidades detectadas.</p>
        
        <a href="sin_puntitos.html" class="btn">Versión Base (Medias y Volúmenes)</a>
        
        <a href="con_puntitos.html" class="btn btn-secondary">Versión Detallada (Nube de Dispersión)</a>
        
        <div class="footer">
            Panel de visualización 3D interactiva
        </div>
    </div>

</body>
</html>
